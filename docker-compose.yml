services:

  postgres:
    container_name: "devboard-db"
    image: postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/
      - ./init/postgres:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10

    ports:
      - "5432:5432"

  backend:
    container_name: "backend"
    image: sahilsanadi/devboard-backend
    environment:
      PORT: "${BACKEND_PORT}"
      POSTGRES_URL: "postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable"
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8081:8080"   # host:container — direct curl/debug; the UI uses the gateway

  frontend:
    container_name: "devboard-frontend"
    image: sahilsanadi/devboard-frontend
    
    depends_on:
      - backend
    ports:
      - "8080:4173"   # vite preview serves on 4173 inside the container

volumes:
  pgdata:

